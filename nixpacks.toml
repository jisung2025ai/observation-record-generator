# Chromium을 위한 시스템 패키지만 추가 (Node.js는 nixpacks가 자동 감지)
[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "atk",
  "cups",
  "gtk3",
  "libdrm",
  "mesa",
  "libxkbcommon",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb"
]
